<!DOCTYPE html>
<html>
<head>
    <title>Signup | Fraud Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .signup-container {
            min-height: 100vh;
        }

        .signup-card {
            background: #1e293b;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            transition: 0.3s;
        }

        .signup-card:hover {
            transform: translateY(-4px);
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            height: 45px;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-signup {
            background: #22c55e;
            border: none;
            font-weight: 500;
        }

        .btn-signup:hover {
            background: #16a34a;
        }

        .title {
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center signup-container">

    <div class="signup-card text-center">

        <!-- 📝 TITLE -->
        <h3 class="title mb-3">Create Account</h3>
        <p class="text-muted mb-4">Register to continue</p>

        <!-- 🧾 FORM -->
        <form method="POST">

            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

            <div class="input-group mb-3">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁️</button>
            </div>

            <button class="btn btn-signup w-100 py-2">Create Account</button>
        </form>

        <!-- LOGIN LINK -->
        <p class="mt-3">
            Already have an account?
            <a href="/login" class="text-info">Sign In</a>
        </p>

    </div>

</div>

<script>
function togglePassword() {
    let pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
