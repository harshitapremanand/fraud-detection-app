<!DOCTYPE html>
<html>
<head>
    <title>Analysis | Fraud Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: #020617;
            padding: 12px 25px;
        }

        .main-card {
            background: #1e293b;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            max-width: 850px;
            margin: auto;
            border: 1px solid #334155;
        }

        .stat-card {
            background: #020617;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
        }

        .stat-card h6 {
            color: #94a3b8;
            font-size: 14px;
        }

        img {
            display: block;
            margin: 20px auto;
            width: 450px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar d-flex justify-content-between">
    <h5>💳 Fraud Detection</h5>
    <div>
        <span class="me-3">👤 {{ session['user'] }}</span>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="main-card">

        <h3 class="text-center mb-4">Fraud Analysis Dashboard</h3>

        <!-- MINI DASHBOARD -->
        <div class="row text-center mb-4">

            <div class="col-md-6">
                <div class="stat-card">
                    <h6>Fraud Probability</h6>
                    <h3 style="color:#ef4444;">{{ prob|round(1) }}%</h3>
                </div>
            </div>

            <div class="col-md-6">
                <div class="stat-card">
                    <h6>Risk Level</h6>
                    <h3>
                        {% if prob > 30 %}
                            <span style="color:#ef4444;">High Risk</span>
                        {% else %}
                            <span style="color:#22c55e;">Low Risk</span>
                        {% endif %}
                    </h3>
                </div>
            </div>

        </div>

        <!-- GRAPH -->
        <img src="{{ url_for('static', filename='graph.png') }}">

        <!-- BACK BUTTON -->
        <a href="/" class="btn btn-primary w-100 mt-3">
            Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
