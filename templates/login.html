<!DOCTYPE html>
<html>
<head>
    <title>SecureBank Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Segoe UI', sans-serif;
">

<div style="
    width:380px;
    padding:40px;
    background:#111827;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
">

    <h3 style="text-align:center; margin-bottom:30px; font-weight:600;">
        SecureBank
    </h3>

    <form method="POST">

        <input 
            type="text" 
            name="username" 
            placeholder="Username"
            style="
                width:100%;
                padding:12px;
                margin-bottom:15px;
                background:#1f2937;
                border:none;
                border-radius:6px;
                color:white;
            " required>

        <input 
            type="password" 
            name="password" 
            placeholder="Password"
            style="
                width:100%;
                padding:12px;
                margin-bottom:20px;
                background:#1f2937;
                border:none;
                border-radius:6px;
                color:white;
            " required>

        <button style="
            width:100%;
            padding:12px;
            background:#2563eb;
            border:none;
            border-radius:6px;
            font-weight:500;
            color:white;
        ">
            Sign In
        </button>

    </form>

    {% if error %}
        <p style="color:#ef4444; text-align:center; margin-top:15px;">
            {{ error }}
        </p>
    {% endif %}

</div>

</body>
</html>
