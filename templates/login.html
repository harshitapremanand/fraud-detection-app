<!DOCTYPE html>
<html>
<head>
    <title>Login | Fraud Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', sans-serif;
            color: #e2e8f0;
        }

        .login-container {
            min-height: 100vh;
        }

        .login-card {
            background: #1e293b;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            transition: 0.3s;
        }

        .login-card:hover {
            transform: translateY(-4px);
        }

        .form-control {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            height: 45px;
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-login {
            background: #3b82f6;
            border: none;
            font-weight: 500;
        }

        .btn-login:hover {
            background: #2563eb;
        }

        .title {
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center login-container">

    <div class="login-card text-center">

        <!-- 🔐 TITLE -->
        <h3 class="title mb-3">Fraud Detection System</h3>
        <p class="text-muted mb-4">Secure Login</p>

        <!-- 🧾 FORM -->
        <form method="POST">

            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

            <div class="input-group mb-3">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁️</button>
            </div>

            <!-- Remember Me -->
            <div class="form-check text-start mb-3">
                <input class="form-check-input" type="checkbox" name="remember">
                <label class="form-check-label">Remember Me</label>
            </div>

            <button class="btn btn-login w-100 py-2">Sign In</button>
        </form>

        <!-- SIGNUP LINK -->
        <p class="mt-3">
            Don’t have an account?
            <a href="/signup" class="text-info">Create one</a>
        </p>

        <!-- ERROR -->
        {% if error %}
            <p class="text-danger mt-3">{{ error }}</p>
        {% endif %}

    </div>

</div>

<script>
function togglePassword() {
    let pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
